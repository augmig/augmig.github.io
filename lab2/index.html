<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lab 2 - A-Frame VR scene</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="aframe/js/aframe-pointcloud-component.js"></script>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
    .controls {
      position: fixed; top: 12px; left: 12px; z-index: 20; width: min(360px, calc(100vw - 24px));
      background: rgba(12, 21, 35, 0.9); color: #fff; border-radius: 12px; padding: 12px;
    }
    .controls h1 { margin: 0 0 8px; font-size: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    button, .back-link {
      border: 1px solid #8bb7ff66; border-radius: 8px; background: #1f355a; color: #fff;
      padding: 8px; cursor: pointer; text-decoration: none; display: inline-block; text-align: center;
    }
    .full { grid-column: 1 / -1; }
    #status { font-size: 12px; margin-top: 8px; color: #d2e2ff; }
  </style>
</head>
<body>
  <div class="controls">
    <a class="back-link" href="../index.html">Back to main page</a>
    <h1>Lab 2 Controls</h1>
    <div class="grid">
      <button data-action="rotate">Rotate</button>
      <button data-action="load-object">Load object</button>
      <button data-action="move-left">Move left</button>
      <button data-action="move-right">Move right</button>
      <button data-action="move-up">Move up</button>
      <button data-action="move-down">Move down</button>
      <button data-action="zoom-in">Zoom in</button>
      <button data-action="zoom-out">Zoom out</button>
      <button class="full" data-action="reset">Reset</button>
    </div>
    <div id="status">Scene ready.</div>
  </div>

  <a-scene background="color: #88b6e8">
    <a-sky color="#9cc8f7"></a-sky>
    <a-plane position="0 0 -4" rotation="-90 0 0" width="24" height="24" color="#6ea36f"></a-plane>
    <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    <a-entity light="type: directional; intensity: 0.9" position="2 4 3"></a-entity>

    <a-entity id="objectRoot" position="0 1.4 -4" rotation="0 0 0" scale="1 1 1">
      <a-cylinder color="#2458a6" height="1" radius="0.35" position="0 0.5 0"></a-cylinder>
      <a-sphere color="#f39c12" radius="0.35" position="0 1.2 0"></a-sphere>
      <a-box color="#8e44ad" depth="0.5" height="0.5" width="0.5" position="0.8 0.4 0"></a-box>
      <a-cone color="#e74c3c" radius-bottom="0.25" height="0.55" position="-0.8 0.35 0"></a-cone>
    </a-entity>

    <a-pointcloud
      id="pointCloud"
      src="url(aframe/sculpt.ply)"
      size="0.01"
      opacity="0.95"
      position="0 1.4 -4"
      rotation="-90 0 0"
      scale="0.11 0.11 0.11"
      visible="false">
    </a-pointcloud>

    <a-entity position="0 1.6 0">
      <a-camera></a-camera>
    </a-entity>
  </a-scene>

  <script>
    (() => {
      const objectRoot = document.getElementById('objectRoot');
      const pointCloud = document.getElementById('pointCloud');
      const status = document.getElementById('status');

      const defaults = {
        position: { x: 0, y: 1.4, z: -4 },
        rotation: { x: 0, y: 0, z: 0 },
        scale: 1
      };

      const state = {
        position: { ...defaults.position },
        rotation: { ...defaults.rotation },
        scale: defaults.scale,
        pointCloudVisible: false,
        pointCloudAvailable: true
      };

      const applyState = (message) => {
        objectRoot.setAttribute('position', `${state.position.x} ${state.position.y} ${state.position.z}`);
        objectRoot.setAttribute('rotation', `${state.rotation.x} ${state.rotation.y} ${state.rotation.z}`);
        objectRoot.setAttribute('scale', `${state.scale} ${state.scale} ${state.scale}`);

        pointCloud.setAttribute('position', `${state.position.x} ${state.position.y} ${state.position.z}`);
        pointCloud.setAttribute('rotation', `-90 ${state.rotation.y} 0`);
        pointCloud.setAttribute('scale', `${state.scale * 0.11} ${state.scale * 0.11} ${state.scale * 0.11}`);
        pointCloud.setAttribute('visible', state.pointCloudVisible && state.pointCloudAvailable);

        status.textContent = message;
      };

      const rotate = () => {
        state.rotation.y += 15;
        applyState('Object rotated.');
      };
      const move = (x, y, z) => {
        state.position.x += x;
        state.position.y += y;
        state.position.z += z;
        applyState('Object moved.');
      };
      const zoom = (factor) => {
        state.scale = Math.max(0.35, Math.min(2.5, state.scale * factor));
        applyState('Zoom changed.');
      };
      const reset = () => {
        Object.assign(state.position, defaults.position);
        Object.assign(state.rotation, defaults.rotation);
        state.scale = defaults.scale;
        applyState('Reset done.');
      };
      const loadObject = () => {
        if (!state.pointCloudAvailable) {
          applyState('Point-cloud model not available, using default objects.');
          return;
        }
        state.pointCloudVisible = !state.pointCloudVisible;
        applyState(state.pointCloudVisible ? 'Point-cloud model loaded.' : 'Point-cloud model hidden.');
      };

      const actions = {
        rotate,
        'move-left': () => move(-0.2, 0, 0),
        'move-right': () => move(0.2, 0, 0),
        'move-up': () => move(0, 0.2, 0),
        'move-down': () => move(0, -0.2, 0),
        'zoom-in': () => zoom(1.15),
        'zoom-out': () => zoom(0.87),
        reset,
        'load-object': loadObject
      };

      document.querySelectorAll('[data-action]').forEach((button) => {
        button.addEventListener('click', () => actions[button.dataset.action]());
      });

      window.addEventListener('keydown', (event) => {
        const key = event.key;
        const map = {
          ArrowLeft: () => { state.rotation.y -= 15; applyState('Object rotated left.'); },
          ArrowRight: () => { state.rotation.y += 15; applyState('Object rotated right.'); },
          w: () => move(0, 0, -0.2),
          W: () => move(0, 0, -0.2),
          s: () => move(0, 0, 0.2),
          S: () => move(0, 0, 0.2),
          a: () => move(-0.2, 0, 0),
          A: () => move(-0.2, 0, 0),
          d: () => move(0.2, 0, 0),
          D: () => move(0.2, 0, 0),
          q: () => move(0, 0.2, 0),
          Q: () => move(0, 0.2, 0),
          e: () => move(0, -0.2, 0),
          E: () => move(0, -0.2, 0),
          '+': () => zoom(1.15),
          '=': () => zoom(1.15),
          '-': () => zoom(0.87),
          r: reset,
          R: reset
        };

        if (map[key]) {
          event.preventDefault();
          map[key]();
        }
      });

      pointCloud.addEventListener('model-error', () => {
        state.pointCloudAvailable = false;
        state.pointCloudVisible = false;
        applyState('Point-cloud model failed to load. Default objects are active.');
      });

      applyState('Scene ready. Use buttons or keyboard controls.');
    })();
  </script>
</body>
</html>
