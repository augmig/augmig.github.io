<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>mediaLab3 - AR UGS Station</title>
    <link rel="stylesheet" href="css/index.css">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.min.js"></script>
</head>
<body>
    <p class="back-link-wrap"><a href="../index.html" class="back-link">Back to main page</a></p>

    <div id="info-panel" class="panel">
        <h1>AR UGS Station</h1>
        <p>
            Point the camera at the Hiro marker. The complex 3D station will appear above it.
            <a class="marker-link" href="marker.html" target="_blank" rel="noopener">Open Hiro marker</a>
        </p>
        <div class="button-row">
            <button id="toggle-animation" type="button">Pause animation</button>
            <button id="scale-up" type="button">Scale +</button>
            <button id="scale-down" type="button">Scale -</button>
            <button id="change-color" type="button">Change color</button>
            <button id="reset-model" type="button">Reset</button>
        </div>
        <p id="status-message" class="status">Loading AR camera...</p>
    </div>

    <a-scene
        embedded
        renderer="antialias: true; alpha: true"
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker id="hiro-marker" preset="hiro">
            <a-entity id="model-anchor"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <noscript>This AR application requires JavaScript.</noscript>
    <script src="js/app.js"></script>
</body>
</html>
