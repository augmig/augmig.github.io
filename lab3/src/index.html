<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>mediaLab3 - AR UGS Station</title>
    <link rel="stylesheet" href="css/index.css">

    <script src="js/three.js"></script>
    <script src="jsartoolkit5/artoolkit.min.js"></script>
    <script src="jsartoolkit5/artoolkit.api.js"></script>
    <script src="threex/threex-artoolkitsource.js"></script>
    <script src="threex/threex-artoolkitcontext.js"></script>
    <script src="threex/threex-arbasecontrols.js"></script>
    <script src="threex/threex-armarkercontrols.js"></script>
</head>
<body>
    <div id="info-panel" class="panel">
        <h1>AR UGS Station</h1>
        <p>Point the camera at the Hiro marker. A custom complex Three.js model will appear above it. <a class="marker-link" href="marker.html" target="_blank" rel="noopener">Open Hiro marker</a></p>
        <div class="button-row">
            <button id="toggle-animation" type="button">Pause animation</button>
            <button id="scale-up" type="button">Scale +</button>
            <button id="scale-down" type="button">Scale -</button>
            <button id="change-color" type="button">Change color</button>
            <button id="reset-model" type="button">Reset</button>
        </div>
        <p id="status-message" class="status">Loading AR camera...</p>
    </div>

    <noscript>This AR application requires JavaScript.</noscript>
    <script src="js/app.js"></script>
</body>
</html>
